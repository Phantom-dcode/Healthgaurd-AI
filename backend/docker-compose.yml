version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: healthguard_user
      POSTGRES_PASSWORD: healthguard_pass
      POSTGRES_DB: healthguard_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthguard_user -d healthguard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://healthguard_user:healthguard_pass@db:5432/healthguard_db
      SECRET_KEY: change-this-in-production-use-openssl-rand-hex-32
      DEBUG: "false"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app/ml_model:/app/app/ml_model

volumes:
  pgdata:
